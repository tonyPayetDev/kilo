version: "3.9"

services:
  kilo:
    build: .
    container_name: kilo_code
    environment:
      KILO_API_KEY: ${KILO_API_KEY}
      COOLIFY_ACCESS_TOKEN: ${COOLIFY_ACCESS_TOKEN}
      GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_PERSONAL_ACCESS_TOKEN}
    volumes:
      - .:/app
      - kilo_skills:/app/.kilocode/skills
    tty: true

volumes:
  kilo_skills:
